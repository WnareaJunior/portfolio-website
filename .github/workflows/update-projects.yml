name: Weekly project refresh

on:
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Fetch projects from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-projects.mjs

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet src/data/projects.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No project changes this week."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/projects.json
            git commit -m "chore: weekly refresh of GitHub project data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes made with GITHUB_TOKEN don't trigger the push-based deploy
      # workflow, so kick it off explicitly.
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run main.yml --ref main
